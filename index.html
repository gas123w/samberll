/* ==========================
   RESET
========================== */
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

/* ==========================
   BODY
========================== */
body{
    font-family:'Roboto',sans-serif;

    radial-gradient(circle at top left, rgba(168,85,247,.20), transparent 40%),
    radial-gradient(circle at bottom right, rgba(124,58,237,.25), transparent 40%),

    background-size:cover;
    background-repeat:no-repeat;

/* ==========================
   CARD
========================== */
.card{
    background:
    linear-gradient(
    180deg,
    rgba(15,23,42,.98),
    rgba(30,27,75,.97));

    border-radius:16px;

    border:1px solid rgba(168,85,247,.25);

    box-shadow:
    0 0 40px rgba(124,58,237,.25),
    inset 0 0 25px rgba(168,85,247,.05);

    max-width:400px;
    width:100%;
    overflow:hidden;
}

/* ==========================
   SECTION
========================== */
.card-header,
.card-title,
.card-banner,
.card-actions,
.card-footer{
    padding:16px;
    text-align:center;
}

/* ==========================
   LOGO
========================== */
.logo-glow{
    display:block;
    margin:0 auto;
    max-width:200px;
    height:auto;

    filter:
    drop-shadow(0 0 6px #A855F7)
    drop-shadow(0 0 12px rgba(124,58,237,.4));

    transition:all .3s ease;
}

.logo-glow:hover{
    transform:scale(1.05);

    filter:
    drop-shadow(0 0 12px #C084FC)
    drop-shadow(0 0 24px #7C3AED);
}

/* ==========================
   TITLE
========================== */
.card-title h1{
    font-size:1.1rem;
    font-weight:700;
    color:#F5F3FF;
    letter-spacing:.03em;

    text-shadow:
    0 0 8px rgba(168,85,247,.8),
    0 0 18px rgba(124,58,237,.5);
}

/* ==========================
   BANNER
========================== */
.card-banner{
    position:relative;
    border-radius:12px;
    overflow:hidden;
}

.card-banner .banner{
    display:block;
    width:100%;
    height:auto;

    animation:zoomIn 20s ease-in-out infinite alternate;
}

.card-banner::after{
    content:'';
    position:absolute;
    inset:0;

    background:
    linear-gradient(
    to bottom,
    rgba(15,23,42,.10),
    rgba(76,29,149,.22));

    pointer-events:none;
}

.banner-text{
    position:absolute;
    bottom:16px;
    left:50%;
    transform:translateX(-50%);

    color:#F5F3FF;
    font-size:1rem;
    font-weight:700;

    text-shadow:
    0 2px 4px rgba(0,0,0,.6),
    0 0 10px rgba(168,85,247,.8);

    opacity:0;

    animation:fadeInText 2s ease-out 1s forwards;
}

/* ==========================
   ANIMATION
========================== */
@keyframes zoomIn{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.05);
    }
}

@keyframes fadeInText{
    to{
        opacity:1;
    }
}

/* ==========================
   BUTTON WRAPPER
========================== */
.card-actions{
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* ==========================
   BUTTON BASE
========================== */
.card-actions .btn-daftar,
.card-actions .btn-login{
    display:block;
    width:100%;
    margin:0 auto;
    padding:12px 0;

    font-weight:700;
    border-radius:8px;
    text-align:center;
    text-decoration:none;

    transition:transform .2s, box-shadow .3s;

    position:relative;
    z-index:1;

    box-shadow:
    inset 0 1px 0 rgba(255,255,255,.3),
    0 4px 6px rgba(0,0,0,.4);
}

/* ==========================
   DAFTAR BUTTON
========================== */
.card-actions .btn-daftar{
    overflow:hidden;

    background-image:
    linear-gradient(
    to bottom,
    #C084FC 0%,
    #A855F7 30%,
    #7C3AED 65%,
    #4C1D95 100%
    );

    border:1px solid #C084FC;
    color:#fff;
}

.card-actions .btn-daftar::before{
    content:'';

    position:absolute;
    top:0;
    left:-120%;

    width:50%;
    height:100%;

    background:
    linear-gradient(
    60deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,.6) 50%,
    rgba(255,255,255,0) 100%
    );

    transform:skewX(-20deg);

    animation:shimmer 2s infinite;
}

.card-actions .btn-daftar:hover{
    transform:translateY(-2px);

    box-shadow:
    0 0 30px rgba(192,132,252,.6),
    0 0 50px rgba(124,58,237,.35);
}

/* ==========================
   LOGIN BUTTON
========================== */
.card-actions .btn-login{
    background:#111827;
    color:#fff;

    border:2px solid transparent;

    background-image:
    linear-gradient(#111827,#111827),
    linear-gradient(
    90deg,
    #C084FC,
    #A855F7,
    #7C3AED,
    #3B82F6
    );

    background-origin:padding-box,border-box;
    background-clip:padding-box,border-box;
}

.card-actions .btn-login::before{
    content:'';

    position:absolute;
    inset:0;

    background:inherit;

    filter:blur(8px);
    opacity:.7;

    animation:slide 3s infinite linear;

    z-index:-1;
}

.card-actions .btn-login:hover{
    transform:translateY(-2px);

    box-shadow:
    0 0 25px rgba(124,58,237,.4);
}

/* ==========================
   EFFECT
========================== */
@keyframes shimmer{
    0%{
        left:-120%;
    }
    100%{
        left:120%;
    }
}

@keyframes slide{
    0%{
        background-position:0 0;
    }
    100%{
        background-position:200% 0;
    }
}

/* ==========================
   FOOTER
========================== */
.card-footer p{
    font-size:.8rem;
    color:rgba(237,233,254,.75);
    margin:0;
}

/* ==========================
   MOBILE
========================== */
@media(max-width:360px){

    .card-actions .btn-daftar,
    .card-actions .btn-login{
        width:90%;
        padding:10px 0;
    }

}
</style>
